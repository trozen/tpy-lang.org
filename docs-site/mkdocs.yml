# Docs site source. Build with:  mkdocs build   (run from docs-site/)
# Output goes to ../docs/docs, which GitHub Pages serves at tpy-lang.org/docs/.
site_name: TurboPython
site_url: https://tpy-lang.org/docs/
site_description: TurboPython documentation -- writing TurboPython, and what works today.

docs_dir: src              # markdown source
site_dir: ../docs/docs     # build output, inside the Pages-served docs/ tree
use_directory_urls: true

theme:
  name: material
  language: en
  custom_dir: overrides    # title-block override (see overrides/main.html)
  logo: assets/logo.svg      # header mark (gradient "TPy")
  favicon: assets/favicon.svg  # slightly wider mark for the browser tab
  font: false              # system fonts -- no external Google Fonts request
  palette:
    scheme: slate          # dark; colors set in stylesheets/extra.css
  features:
    - navigation.indexes   # a section's index.md becomes its clickable header
    - navigation.expand    # sections start expanded
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link   # picking uv/pip in one tab group switches all groups

extra_css:
  - stylesheets/extra.css

extra:
  homepage: /   # header logo leads to the main site (root-relative: works locally too)
  # tpy_version / tpy_release / tpy_prerelease are set by hooks/version.py.
  # Not `version:` -- Material claims that key for its mike version selector.

hooks:
  - hooks/version.py   # reads the tpy version out of the vendor/tpy submodule

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Guide:
      - guide/index.md     # section index -- "Guide" itself links here
      - How TPy differs: guide/differences.md
      - Types: guide/types.md
      - Functions: guide/functions.md
      - Ownership: guide/ownership.md
      - Data modeling: guide/data-modeling.md
      - Control flow: guide/control-flow.md
      - Efficiency: guide/efficiency.md
      - Building: guide/building.md
      - Beyond the core: guide/beyond.md
      - Coming from C++/Rust: guide/cpp-rust.md
  - Compatibility: compatibility.md

markdown_extensions:
  - admonition
  - attr_list             # external links: { target="_blank" rel="noopener" }, see CLAUDE.md
  # `--` in prose renders as an em-dash; code spans/blocks are left untouched.
  # Dashes only -- quotes/ellipses stay literal so nothing else is rewritten.
  - smarty:
      smart_quotes: false
      smart_ellipses: false
      substitutions:
        ndash: "—"
  - toc:
      permalink: true
      toc_depth: 3          # keep h4 (compatibility library entries) out of the sidebar TOC
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
